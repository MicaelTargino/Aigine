version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aigine-postgres
    environment:
      POSTGRES_USER: aigine
      POSTGRES_PASSWORD: aigine_password
      POSTGRES_DB: aigine_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigine"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aigine-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aigine-app
    environment:
      DATABASE_URL: postgresql://aigine:aigine_password@postgres:5432/aigine_db?schema=public
      ADMIN_USER: admin
      ADMIN_PASS: changeme123
      SESSION_SECRET: your-secret-key-change-in-production
      IP_HASH_SALT: your-salt-change-in-production
      DEMO_VIDEO_URL: https://example.com/demo.mp4
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aigine-network

volumes:
  postgres_data:

networks:
  aigine-network:
    driver: bridge